# ADE Compliance Configuration
# This file defaults to strictness: enforce for core business logic compliance.

global:
  strictness: enforce
  enabled: true
  audit_path: ".ade_compliance/audit.sqlite"

engines:
  spec:
    enabled: true
    strictness: enforce
    
  test:
    enabled: true
    strictness: enforce
    min_coverage: 80
    
  traceability:
    enabled: true
    strictness: enforce
    languages:
      - python
      - typescript
      - javascript
      - java

reporting:
  trend_retention_days: 90
