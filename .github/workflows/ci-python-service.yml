name: Python Service CI/CD

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to use'
        required: false
        type: string
        default: '3.11'
      service-name:
        description: 'Cloud Run service name'
        required: true
        type: string
      region:
        description: 'GCP region for deployment'
        required: false
        type: string
        default: 'us-central1'
      deploy:
        description: 'Whether to deploy to Cloud Run'
        required: false
        type: boolean
        default: false
    secrets:
      GCP_PROJECT_ID:
        description: 'GCP Project ID'
        required: false
      GCP_SA_KEY:
        description: 'GCP Service Account Key (JSON)'
        required: false

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f # v5.1.1
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run linting
        run: |
          source .venv/bin/activate
          ruff check .

      - name: Run type checking
        run: |
          source .venv/bin/activate
          mypy src/

      - name: Run tests
        run: |
          source .venv/bin/activate
          pytest --cov=src --cov-report=xml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: ${{ inputs.deploy && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@26f734c # v3.0.0

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ inputs.service-name }} \
            --source . \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --region ${{ inputs.region }} \
            --allow-unauthenticated
