name: Architecture & ADR Formatting Guardian

on:
  push:
    branches:
      - main
    paths:
      - 'docs/decisions/**'
      - '.github/workflows/adr-guardian.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'docs/decisions/**'
      - '.github/workflows/adr-guardian.yml'
  merge_group:

permissions:
  contents: read

jobs:
  validate-adrs:
    name: Validate ADR Format and Sanity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install uv and pyadr
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install dependencies
        run: |
          uv venv
          uv pip install pyadr

      - name: Execute pyadr checks
        run: |
          source .venv/bin/activate
          pyadr check-adr-repo
