name: Compliance and Security

on:
  workflow_call:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f # v5.1.1
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e .
          uv pip install detect-secrets pytest pytest-asyncio pytest-cov

      - name: Run ADE Compliance Gate
        run: |
          source .venv/bin/activate
          ade-compliance check-all src/

      - name: Run detect-secrets scan
        run: |
          source .venv/bin/activate
          detect-secrets scan --exclude-files "tests/.*" > detect-secrets-results.json
          if [ $(jq '.results | length' detect-secrets-results.json) -gt 0 ]; then
            echo "FAIL: Hardcoded secrets detected!"
            cat detect-secrets-results.json
            exit 1
          fi
          echo "No secrets detected."

      - name: Verify commit signatures
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            git fetch origin "$BASE_REF"
            commits=$(git log origin/"$BASE_REF"..HEAD --no-merges --format="%H")
          else
            commits=$(git log -5 --no-merges --format="%H")
          fi
          
          if [ -z "$commits" ]; then
            echo "No commits found to verify."
            exit 0
          fi
          
          echo "Verifying signature status for commits:"
          for commit in $commits; do
            echo "Checking commit: $commit"
            sig_status=$(git log -1 --format="%G?" $commit)
            echo "Signature status: $sig_status"
            
            # Check if commit has gpgsig header (covers SSH-signed commits on GHA runners)
            has_gpgsig=false
            if git cat-file -p $commit | grep -q "^gpgsig"; then
              has_gpgsig=true
              echo "Found gpgsig header."
            fi
            
            if [ "$sig_status" != "G" ] && [ "$sig_status" != "U" ] && [ "$has_gpgsig" != "true" ]; then
              echo "FAIL: Commit $commit is not signed or has an invalid signature!"
              exit 1
            fi
          done
          echo "All commits have valid signatures."
