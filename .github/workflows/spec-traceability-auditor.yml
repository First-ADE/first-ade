name: Spec-Kit Requirements & Traceability Auditor

on:
  push:
    branches:
      - main
    paths:
      - 'specs/**'
      - '.github/scripts/audit_specs.py'
      - '.github/workflows/spec-traceability-auditor.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'specs/**'
      - '.github/scripts/audit_specs.py'
      - '.github/workflows/spec-traceability-auditor.yml'
  merge_group:

permissions:
  contents: read

jobs:
  audit-specs:
    name: Audit Spec-Kit Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f # v5.1.1
        with:
          python-version: '3.11'

      - name: Run Spec-Kit Traceability Auditor
        run: |
          python .github/scripts/audit_specs.py
