name: Automated Security & Codebase Auditor

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'pyproject.toml'
      - '.github/workflows/security-audit.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'pyproject.toml'
      - '.github/workflows/security-audit.yml'
  schedule:
    - cron: '0 12 * * *' # Run daily at noon UTC for drift checks

permissions:
  contents: read

jobs:
  security-audit:
    name: Run Static Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install uv and tools
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install dependencies
        run: |
          uv venv
          uv pip install bandit safety

      - name: Run Bandit Security Scanner
        run: |
          source .venv/bin/activate
          # -r scans recursively; -c specifies config or skips if default
          # -ll filters for medium and high severity findings
          bandit -r src/ -ll

      - name: Run Safety Dependency Auditor
        run: |
          source .venv/bin/activate
          # Audit current installed dependencies
          uv pip freeze > requirements.txt
          safety check -r requirements.txt || echo "WARNING: Vulnerable dependencies identified!"
