name: On-Demand Performance Benchmark

on:
  workflow_dispatch:
    inputs:
      target_module:
        description: 'Module or command to benchmark (e.g. ade-compliance, pytest)'
        required: true
        default: 'ade-compliance check-all src/'
      runs:
        description: 'Number of iteration runs'
        required: false
        default: '5'

permissions:
  contents: read

jobs:
  benchmark:
    name: Execute Benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f # v5.1.1
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run Benchmarking Loop
        env:
          TARGET: ${{ github.event.inputs.target_module }}
          RUNS: ${{ github.event.inputs.runs }}
        run: |
          source .venv/bin/activate
          echo "========================================="
          echo "BENCHMARK PROFILE TARGET: $TARGET"
          echo "ITERATION RUNS:          $RUNS"
          echo "========================================="
          
          python -c "
          import time, subprocess, sys
          target = '$TARGET'
          runs = int('$RUNS')
          times = []
          for i in range(1, runs + 1):
              print(f'Running iteration {i}...')
              start = time.perf_counter()
              res = subprocess.run(target, shell=True, capture_output=True, text=True)
              end = time.perf_counter()
              elapsed = end - start
              times.append(elapsed)
              print(f'Iteration {i} finished in {elapsed:.4f} seconds (Exit Code: {res.returncode})')
          
          avg_time = sum(times) / len(times)
          print('\n=========================================')
          print(f'Benchmark Results for: {target}')
          print(f'Min time: {min(times):.4f}s')
          print(f'Max time: {max(times):.4f}s')
          print(f'Avg time: {avg_time:.4f}s')
          print('=========================================')
          "
