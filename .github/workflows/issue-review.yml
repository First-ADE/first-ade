name: Issue Completeness Review

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  review-issue:
    name: Review Issue Completeness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@1af3b93f18e97669d012431776993108c4912959 # v6.0.0

      - name: Set up Python
        uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f # v5.1.1
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-generativeai==0.8.3 requests==2.32.3

      - name: Run Issue Reviewer Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python .github/scripts/review_issue.py
